name: Custom Client Setup

on:
  workflow_call:
    inputs:
      build:
        type: string
        description: "Build type"
        default: ""

jobs:
  setup-custom-client:
    name: Setup Custom Client Configuration
    if: ${{ inputs.build != '' }}
    runs-on: ubuntu-latest
    environment: custom_client_${{ inputs.build }}
    steps:
      - name: Custom config, check if present
        id: check-config
        run: |
          if [[ '${{ vars.CUSTOM_CONFIG_JSON }}' == '' ]]; then
            echo "ERROR: empty variable CUSTOM_CONFIG_JSON for environment custom_client_${{ inputs.build }}"
            exit 1
          fi

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Custom client, install python
        uses: actions/setup-python@v6

      - name: Custom client, validate config JSON
        shell: bash
        run: |
          pip install pynacl
          python3 res/custom_client_utils.py validate-json --config '${{ vars.CUSTOM_CONFIG_JSON }}'

      - name: Custom client, generate or validate encryption keys
        shell: bash
        run: |
          if [ -n "${{ secrets.CUSTOM_CONFIG_PUBLIC_KEY }}" ] && [ -n "${{ secrets.CUSTOM_CONFIG_PRIVATE_KEY }}" ]; then
            echo "Validating provided keys..."
            python3 res/custom_client_utils.py validate-keys --public-key "${{ secrets.CUSTOM_CONFIG_PUBLIC_KEY }}" --private-key "${{ secrets.CUSTOM_CONFIG_PRIVATE_KEY }}"
            echo "${{ secrets.CUSTOM_CONFIG_PUBLIC_KEY }}" > custom_client_public_key.txt
            echo "${{ secrets.CUSTOM_CONFIG_PRIVATE_KEY }}" > custom_client_private_key.txt
          else
            echo "Generating new keypair..."
            python3 res/custom_client_utils.py generate-keys
          fi

      - name: Custom client, encrypt config
        shell: bash
        run: |
          python3 res/custom_client_utils.py encrypt --config '${{ vars.CUSTOM_CONFIG_JSON }}' --private-key "$(cat custom_client_private_key.txt)" --output custom.txt

      - name: Upload custom client public key
        uses: actions/upload-artifact@v4
        with:
          name: custom-public-key-${{ inputs.build }}
          path: custom_client_public_key.txt
          if-no-files-found: error

      - name: Upload custom client private key
        uses: actions/upload-artifact@v4
        with:
          name: custom-private-key-${{ inputs.build }}
          path: custom_client_private_key.txt
          if-no-files-found: error

      - name: Upload custom client config
        uses: actions/upload-artifact@v4
        with:
          name: custom-config-${{ inputs.build }}
          path: custom.txt
          if-no-files-found: error
