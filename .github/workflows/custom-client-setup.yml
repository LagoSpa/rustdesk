name: Custom Client Setup

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      environment:
        type: string
        description: "Environment"
        default: ""
    outputs:
      has-custom-config:
        description: "Whether custom config is present"
        value: ${{ jobs.setup-custom-client.outputs.has-custom-config }}

env:
  CUSTOM_CONFIG_JSON: ${{ vars.CUSTOM_CONFIG_JSON }}
  CUSTOM_CONFIG_PUBLIC_KEY: ${{ vars.CUSTOM_CONFIG_PUBLIC_KEY }}
  CUSTOM_CONFIG_PRIVATE_KEY: ${{ vars.CUSTOM_CONFIG_PRIVATE_KEY }}

jobs:
  setup-custom-client:
    name: Setup Custom Client Configuration
    runs-on: ubuntu-latest
    outputs:
      has-custom-config: ${{ steps.check-config.outputs.has-custom-config }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check if custom config is present
        id: check-config
        run: |
          if [ -n "$CUSTOM_CONFIG_JSON" ]; then
            echo "has-custom-config=true" >> $GITHUB_OUTPUT
          else
            echo "has-custom-config=false" >> $GITHUB_OUTPUT
          fi

      - name: Custom client, install python
        if: env.CUSTOM_CONFIG_JSON != null
        uses: actions/setup-python@v6

      - name: Custom client, validate config JSON
        if: env.CUSTOM_CONFIG_JSON != null
        shell: bash
        run: |
          pip install pynacl
          python3 res/custom_client_utils.py validate-json --config "$CUSTOM_CONFIG_JSON"

      - name: Custom client, generate or validate encryption keys
        if: env.CUSTOM_CONFIG_JSON != null
        shell: bash
        run: |
          if [ -n "$CUSTOM_CONFIG_PUBLIC_KEY" ] && [ -n "$CUSTOM_CONFIG_PRIVATE_KEY" ]; then
            echo "Validating provided keys..."
            python3 res/custom_client_utils.py validate-keys --public-key "$CUSTOM_CONFIG_PUBLIC_KEY" --private-key "$CUSTOM_CONFIG_PRIVATE_KEY"
            echo "CUSTOM_CONFIG_PUBLIC_KEY=$CUSTOM_CONFIG_PUBLIC_KEY" >> $GITHUB_ENV
            echo "CUSTOM_CONFIG_PRIVATE_KEY=$CUSTOM_CONFIG_PRIVATE_KEY" >> $GITHUB_ENV
          else
            echo "Generating new keypair..."
            KEYS_OUTPUT=$(python3 res/custom_client_utils.py generate-keys)
            echo "$KEYS_OUTPUT" >> $GITHUB_ENV
          fi

      - name: Custom client, encrypt config
        if: env.CUSTOM_CONFIG_JSON != null
        shell: bash
        run: |
          python3 res/custom_client_utils.py encrypt --config "$CUSTOM_CONFIG_JSON" --private-key "$CUSTOM_CONFIG_PRIVATE_KEY" --output custom.txt

      - name: Custom client, upload key artifacts
        if: env.CUSTOM_CONFIG_JSON != null
        uses: actions/upload-artifact@master
        with:
          name: custom-client-keys-${{ inputs.client_type }}
          path: |
            custom_client_public_key.txt
            custom_client_private_key.txt

      - name: Custom client, upload encrypted config
        if: env.CUSTOM_CONFIG_JSON != null
        uses: actions/upload-artifact@master
        with:
          name: custom-client-config-${{ inputs.client_type }}
          path: custom.txt
